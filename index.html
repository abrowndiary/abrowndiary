<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Brown Diary</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .qualy { font-family: system-ui; font-weight: 900; letter-spacing: -0.04em; } /* Qualy approximation */
    </style>
</head>
<body class="bg-[#0A0A0C] text-slate-200 antialiased">
    <!-- Navbar -->
    <nav class="sticky top-0 z-50 border-b border-white/10 bg-[#0A0A0C]/80 backdrop-blur-lg">
        <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="qualy text-2xl tracking-tighter">A Brown Diary</span>
            </div>
            <div class="flex gap-8 text-sm">
                <a href="#journal" class="hover:text-white transition">Journal</a>
                <a href="#videos" class="hover:text-white transition">Videos</a>
                <a href="#resources" class="hover:text-white transition">Resources</a>
                <a href="#about" class="hover:text-white transition">About</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <header class="min-h-screen flex items-center justify-center relative overflow-hidden">
        <div class="max-w-4xl mx-auto px-6 text-center relative z-10">
            <h1 class="qualy text-7xl md:text-8xl tracking-tighter leading-none mb-6">
                Life.<br>Tech.<br>Germany.
            </h1>
            <p class="text-xl text-slate-400 max-w-lg mx-auto">
                Mannheim MBA turned operator. Sharing raw lessons from building in AI, automation, cybersecurity and startups.
            </p>
            <div class="mt-12 flex gap-4 justify-center">
                <a href="#resources" class="bg-white text-black px-8 py-4 rounded-2xl font-medium hover:scale-105 transition">
                    Get Free German CV Template
                </a>
                <a href="https://youtube.com/@abrowndiary" target="_blank" class="border border-white/30 px-8 py-4 rounded-2xl hover:bg-white/5 transition flex items-center gap-2">
                    <i class="fa-brands fa-youtube"></i> Watch Latest
                </a>
            </div>
        </div>
    </header>

    <!-- More sections... -->
</body>
</html>
